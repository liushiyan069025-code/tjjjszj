<main data-name="page-history" class="flex flex-col justify-start items-center w-[390px] min-h-[844px] bg-[#030712]">
  <div data-name="header" class="flex flex-col justify-center items-center self-stretch border-b-[1px] border-[#1F2937] pt-[12px] pb-[12px] gap-[4px]">
    <div data-name="header-row" class="flex flex-row justify-center items-center gap-[8px]">
      <img data-name="logo-icon" src="./asset/icons/logo.png" class="w-[24px] h-[24px] object-contain" />
      <span data-name="app-title" class="text-[16px] leading-[20px] font-[700] text-[#FB923C]">头尖尖私教</span>
    </div>
    <span data-name="tagline" class="text-[10px] leading-[12px] text-[#6B7280]">常熟可能瘦了，但是常熟瘦了不太可能</span>
  </div>
  <div data-name="content" class="flex flex-col self-stretch flex-1 px-[16px] pt-[12px] pb-[72px] gap-[16px]">
    <div data-name="title-row" class="flex flex-row items-center gap-[8px]">
      <img data-name="title-icon" src="./asset/icons/nav-history.png" class="w-[20px] h-[20px] object-contain" />
      <span data-name="title" class="text-[18px] leading-[22px] font-[700] text-[#F3F4F6]">战绩回顾</span>
    </div>
    <div data-name="weight-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[12px]">
      <span data-name="weight-title" class="text-[14px] font-[700] text-[#D1D5DB]">上秤看看</span>
      <div data-name="weight-input-row" class="flex flex-row self-stretch gap-[8px]">
        <div data-name="weight-input" class="flex flex-row items-center flex-1 bg-[#374151] rounded-[12px] px-[12px] py-[10px]"><span data-name="weight-placeholder" class="text-[14px] text-[#6B7280]">那我问你，今天多少斤？(kg)</span></div>
        <div data-name="weight-btn" class="flex flex-row justify-center items-center bg-[#F97316] rounded-[12px] px-[16px] py-[10px]"><span data-name="weight-btn-text" class="text-[14px] font-[700] text-[#FFFFFF]">记上</span></div>
      </div>
    </div>
    <div data-name="chart-weight" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <span data-name="chart-weight-title" class="text-[14px] font-[700] text-[#D1D5DB]">体重走势 (近30天)</span>
      <div data-name="chart-weight-area" class="flex flex-row items-end self-stretch h-[120px] bg-[#111827] rounded-[12px] p-[12px] gap-[4px]">
        <div data-name="bar-w1" class="w-[8px] h-[60px] bg-[#F97316] rounded-[4px]"></div>
        <div data-name="bar-w2" class="w-[8px] h-[72px] bg-[#F97316] rounded-[4px]"></div>
        <div data-name="bar-w3" class="w-[8px] h-[68px] bg-[#F97316] rounded-[4px]"></div>
        <div data-name="bar-w4" class="w-[8px] h-[55px] bg-[#F97316] rounded-[4px]"></div>
        <div data-name="bar-w5" class="w-[8px] h-[50px] bg-[#F97316] rounded-[4px]"></div>
        <div data-name="bar-w6" class="w-[8px] h-[48px] bg-[#22C55E] rounded-[4px]"></div>
        <div data-name="bar-w7" class="w-[8px] h-[45px] bg-[#22C55E] rounded-[4px]"></div>
      </div>
      <span data-name="chart-weight-note" class="text-[12px] text-[#9CA3AF]">72.5 kg → 71.2 kg 下降趋势</span>
    </div>
    <div data-name="chart-calorie" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <span data-name="chart-cal-title" class="text-[14px] font-[700] text-[#D1D5DB]">每日吃多少 (近7天)</span>
      <div data-name="chart-cal-area" class="flex flex-row items-end self-stretch h-[100px] bg-[#111827] rounded-[12px] p-[12px] gap-[8px]">
        <div data-name="cal-b1" class="flex flex-col items-center gap-[2px]"><div class="w-[24px] h-[70px] bg-[#F97316] rounded-[4px]"></div><span class="text-[10px] text-[#6B7280]">一</span></div>
        <div data-name="cal-b2" class="flex flex-col items-center gap-[2px]"><div class="w-[24px] h-[85px] bg-[#F97316] rounded-[4px]"></div><span class="text-[10px] text-[#6B7280]">二</span></div>
        <div data-name="cal-b3" class="flex flex-col items-center gap-[2px]"><div class="w-[24px] h-[60px] bg-[#F97316] rounded-[4px]"></div><span class="text-[10px] text-[#6B7280]">三</span></div>
        <div data-name="cal-b4" class="flex flex-col items-center gap-[2px]"><div class="w-[24px] h-[90px] bg-[#EF4444] rounded-[4px]"></div><span class="text-[10px] text-[#6B7280]">四</span></div>
        <div data-name="cal-b5" class="flex flex-col items-center gap-[2px]"><div class="w-[24px] h-[55px] bg-[#22C55E] rounded-[4px]"></div><span class="text-[10px] text-[#6B7280]">五</span></div>
      </div>
    </div>
    <div data-name="report-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <div data-name="report-head" class="flex flex-row justify-between items-center self-stretch">
        <span data-name="report-title" class="text-[14px] font-[700] text-[#D1D5DB]">诺神周报</span>
        <div data-name="report-btn" class="flex flex-row justify-center items-center bg-[#F97316] rounded-[12px] px-[12px] py-[6px]"><span data-name="report-btn-text" class="text-[12px] font-[700] text-[#FFFFFF]">让诺神总结</span></div>
      </div>
      <p data-name="report-preview" class="text-[12px] leading-[18px] text-[#9CA3AF] text-left self-stretch">那我问你，这周蛋白可能够了，但是够了不太可能——下周继续干！</p>
    </div>
  </div>
  <div data-name="bottom-nav" class="flex flex-row justify-around items-center self-stretch w-[390px] h-[64px] bg-[#111827] border-t-[1px] border-[#374151]">
    <div data-name="nav-today" class="flex flex-col items-center gap-[2px]"><img data-name="nav-today-icon" src="./asset/icons/nav-today.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-today-label" class="text-[11px] text-[#6B7280]">今日干饭</span></div>
    <div data-name="nav-history" class="flex flex-col items-center gap-[2px]"><img data-name="nav-history-icon" src="./asset/icons/nav-history.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-history-label" class="text-[11px] font-[700] text-[#F97316]">战绩回顾</span></div>
    <div data-name="nav-profile" class="flex flex-col items-center gap-[2px]"><img data-name="nav-profile-icon" src="./asset/icons/nav-profile.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-profile-label" class="text-[11px] text-[#6B7280]">诺神配置</span></div>
  </div>
</main>
