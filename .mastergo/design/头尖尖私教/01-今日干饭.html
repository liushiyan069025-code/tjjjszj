<main data-name="page-today" class="flex flex-col justify-start items-center w-[390px] min-h-[844px] bg-[#030712]">
  <div data-name="header" class="flex flex-col justify-center items-center self-stretch border-b-[1px] border-[#1F2937] pt-[12px] pb-[12px] gap-[4px]">
    <div data-name="header-row" class="flex flex-row justify-center items-center gap-[8px]">
      <img data-name="logo-icon" src="./asset/icons/logo.png" class="w-[24px] h-[24px] object-contain" />
      <span data-name="app-title" class="text-[16px] leading-[20px] font-[700] text-[#FB923C]">头尖尖私教</span>
      <span data-name="badge" class="text-[10px] leading-[12px] font-[700] text-[#FB923C] border-[1px] border-[#F97316] rounded-[12px] px-[8px] py-[2px]">诺神出品</span>
    </div>
    <span data-name="tagline" class="text-[10px] leading-[12px] text-[#6B7280]">那我问你，今天练了没？</span>
  </div>
  <div data-name="content" class="flex flex-col self-stretch flex-1 px-[16px] pt-[12px] pb-[72px] gap-[16px]">
    <div data-name="title-row" class="flex flex-row items-center gap-[8px]">
      <img data-name="title-icon" src="./asset/icons/fire.png" class="w-[20px] h-[20px] object-contain" />
      <span data-name="title" class="text-[18px] leading-[22px] font-[700] text-[#F3F4F6]">今日干饭</span>
    </div>
    <div data-name="calorie-card" class="flex flex-col items-center self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[12px]">
      <div data-name="ring" class="flex flex-col items-center justify-center w-[140px] h-[140px] rounded-[70px] border-[12px] border-[#22C55E] bg-[#111827]">
        <span data-name="ring-val" class="text-[26px] font-[700] text-[#FB923C]">1280</span>
        <span data-name="ring-sub" class="text-[12px] text-[#9CA3AF]">/ 2100 kcal</span>
      </div>
      <span data-name="deficit" class="text-[20px] font-[700] text-[#22C55E]">缺口 -820 kcal</span>
      <p data-name="tip" class="text-[12px] leading-[16px] text-[#9CA3AF] text-center self-stretch">缺口拉满！铁子可能要瘦成头尖尖的了！</p>
      <div data-name="stats-row" class="flex flex-row justify-between self-stretch gap-[8px]">
        <div data-name="stat-eat" class="flex flex-col items-center flex-1 bg-[#F97316] bg-opacity-10 rounded-[12px] p-[8px] gap-[2px]"><span data-name="stat-eat-v" class="text-[16px] font-[700] text-[#FB923C]">1280</span><span data-name="stat-eat-l" class="text-[10px] text-[#9CA3AF]">吃进去的</span></div>
        <div data-name="stat-tdee" class="flex flex-col items-center flex-1 bg-[#3B82F6] bg-opacity-10 rounded-[12px] p-[8px] gap-[2px]"><span data-name="stat-tdee-v" class="text-[16px] font-[700] text-[#60A5FA]">1850</span><span data-name="stat-tdee-l" class="text-[10px] text-[#9CA3AF]">身体烧的</span></div>
        <div data-name="stat-burn" class="flex flex-col items-center flex-1 bg-[#8B5CF6] bg-opacity-10 rounded-[12px] p-[8px] gap-[2px]"><span data-name="stat-burn-v" class="text-[16px] font-[700] text-[#A78BFA]">250</span><span data-name="stat-burn-l" class="text-[10px] text-[#9CA3AF]">铁子练的</span></div>
      </div>
    </div>
    <div data-name="nutrients-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <span data-name="nutrients-title" class="text-[14px] font-[700] text-[#D1D5DB]">三大营养素</span>
      <span data-name="carbs-label" class="text-[12px] text-[#9CA3AF]">碳水 120/200g</span>
      <div data-name="carbs-bar" class="h-[8px] self-stretch bg-[#374151] rounded-[8px]"><div data-name="carbs-fill" class="w-[180px] h-[8px] bg-[#FB923C] rounded-[8px]"></div></div>
      <span data-name="protein-label" class="text-[12px] text-[#9CA3AF]">蛋白质 85/140g</span>
      <div data-name="protein-bar" class="h-[8px] self-stretch bg-[#374151] rounded-[8px]"><div data-name="protein-fill" class="w-[160px] h-[8px] bg-[#60A5FA] rounded-[8px]"></div></div>
      <span data-name="fat-label" class="text-[12px] text-[#9CA3AF]">脂肪 42/60g</span>
      <div data-name="fat-bar" class="h-[8px] self-stretch bg-[#374151] rounded-[8px]"><div data-name="fat-fill" class="w-[130px] h-[8px] bg-[#A78BFA] rounded-[8px]"></div></div>
    </div>
    <div data-name="workout-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <span data-name="workout-title" class="text-[14px] font-[700] text-[#D1D5DB]">今日训练 · 推日</span>
      <span data-name="workout-meta" class="text-[12px] text-[#9CA3AF]">胸/肩/三头 · 3/6 完成 · 320kcal</span>
    </div>
    <div data-name="meal-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <span data-name="meal-title" class="text-[14px] font-[700] text-[#D1D5DB]">今日干饭记录</span>
      <span data-name="meal-summary" class="text-[13px] text-[#F3F4F6]">早餐 420 · 午餐 560 · 晚餐 待添加</span>
      <span data-name="meal-ai" class="text-[12px] text-[#FB923C]">诺神推荐食谱 · 那我问你，给我安排？</span>
    </div>
  </div>
  <div data-name="bottom-nav" class="flex flex-row justify-around items-center self-stretch w-[390px] h-[64px] bg-[#111827] border-t-[1px] border-[#374151]">
    <div data-name="nav-today" class="flex flex-col items-center gap-[2px]"><img data-name="nav-today-icon" src="./asset/icons/nav-today.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-today-label" class="text-[11px] font-[700] text-[#F97316]">今日干饭</span></div>
    <div data-name="nav-history" class="flex flex-col items-center gap-[2px]"><img data-name="nav-history-icon" src="./asset/icons/nav-history.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-history-label" class="text-[11px] text-[#6B7280]">战绩回顾</span></div>
    <div data-name="nav-profile" class="flex flex-col items-center gap-[2px]"><img data-name="nav-profile-icon" src="./asset/icons/nav-profile.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-profile-label" class="text-[11px] text-[#6B7280]">诺神配置</span></div>
  </div>
</main>
