<main data-name="page-profile" class="flex flex-col justify-start items-center w-[390px] min-h-[844px] bg-[#030712]">
  <div data-name="header" class="flex flex-col justify-center items-center self-stretch border-b-[1px] border-[#1F2937] pt-[12px] pb-[12px] gap-[4px]">
    <div data-name="header-row" class="flex flex-row justify-center items-center gap-[8px]">
      <img data-name="logo-icon" src="./asset/icons/logo.png" class="w-[24px] h-[24px] object-contain" />
      <span data-name="app-title" class="text-[16px] leading-[20px] font-[700] text-[#FB923C]">头尖尖私教</span>
    </div>
    <span data-name="tagline" class="text-[10px] leading-[12px] text-[#6B7280]">啊你知道吧，填完身体数据让诺神给你安排</span>
  </div>
  <div data-name="content" class="flex flex-col self-stretch flex-1 px-[16px] pt-[12px] pb-[72px] gap-[16px]">
    <div data-name="title-row" class="flex flex-row items-center gap-[8px]">
      <img data-name="title-icon" src="./asset/icons/nav-profile.png" class="w-[20px] h-[20px] object-contain" />
      <span data-name="title" class="text-[18px] leading-[22px] font-[700] text-[#F3F4F6]">诺神配置</span>
    </div>
    <div data-name="body-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[12px]">
      <span data-name="body-title" class="text-[14px] font-[700] text-[#D1D5DB]">身体数据</span>
      <div data-name="body-grid" class="flex flex-row flex-wrap self-stretch gap-[8px]">
        <div data-name="field-height" class="flex flex-col w-[160px] gap-[4px]"><span class="text-[12px] text-[#9CA3AF]">身高 (cm)</span><div class="bg-[#374151] rounded-[12px] px-[12px] py-[8px]"><span class="text-[14px] text-[#F3F4F6]">175</span></div></div>
        <div data-name="field-weight" class="flex flex-col w-[160px] gap-[4px]"><span class="text-[12px] text-[#9CA3AF]">体重 (kg)</span><div class="bg-[#374151] rounded-[12px] px-[12px] py-[8px]"><span class="text-[14px] text-[#F3F4F6]">72.5</span></div></div>
        <div data-name="field-age" class="flex flex-col w-[160px] gap-[4px]"><span class="text-[12px] text-[#9CA3AF]">年龄</span><div class="bg-[#374151] rounded-[12px] px-[12px] py-[8px]"><span class="text-[14px] text-[#F3F4F6]">25</span></div></div>
        <div data-name="field-gender" class="flex flex-col w-[160px] gap-[4px]"><span class="text-[12px] text-[#9CA3AF]">性别</span><div class="bg-[#374151] rounded-[12px] px-[12px] py-[8px]"><span class="text-[14px] text-[#F3F4F6]">男</span></div></div>
      </div>
    </div>
    <div data-name="metrics-card" class="flex flex-row self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <div data-name="metric-bmi" class="flex flex-col items-center flex-1 bg-[#374151] bg-opacity-50 rounded-[12px] p-[8px] gap-[2px]"><span class="text-[20px] font-[700] text-[#22C55E]">23.5</span><span class="text-[10px] text-[#9CA3AF]">BMI 正常</span></div>
      <div data-name="metric-bmr" class="flex flex-col items-center flex-1 bg-[#374151] bg-opacity-50 rounded-[12px] p-[8px] gap-[2px]"><span class="text-[20px] font-[700] text-[#FB923C]">1680</span><span class="text-[10px] text-[#9CA3AF]">BMR</span></div>
      <div data-name="metric-tdee" class="flex flex-col items-center flex-1 bg-[#374151] bg-opacity-50 rounded-[12px] p-[8px] gap-[2px]"><span class="text-[20px] font-[700] text-[#FB923C]">2310</span><span class="text-[10px] text-[#9CA3AF]">TDEE</span></div>
    </div>
    <div data-name="goal-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <div data-name="goal-head" class="flex flex-row justify-between items-center self-stretch">
        <span data-name="goal-title" class="text-[14px] font-[700] text-[#D1D5DB]">AI 营养目标</span>
        <div data-name="goal-btn" class="bg-[#F97316] rounded-[12px] px-[12px] py-[6px]"><span class="text-[12px] font-[700] text-[#FFFFFF]">那我问你，生成目标？</span></div>
      </div>
      <div data-name="goal-stats" class="flex flex-row self-stretch gap-[8px]">
        <div data-name="goal-cal" class="flex flex-col items-center flex-1 bg-[#F97316] bg-opacity-10 rounded-[12px] p-[8px]"><span class="text-[22px] font-[700] text-[#FB923C]">1850</span><span class="text-[10px] text-[#9CA3AF]">kcal/日</span></div>
        <div data-name="goal-macros" class="flex flex-col flex-1 gap-[4px]"><span class="text-[12px] text-[#FB923C]">碳水 200g</span><span class="text-[12px] text-[#60A5FA]">蛋白 140g</span><span class="text-[12px] text-[#A78BFA]">脂肪 60g</span></div>
      </div>
    </div>
    <div data-name="workout-plan-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <div data-name="plan-head" class="flex flex-row justify-between items-center self-stretch">
        <span data-name="plan-title" class="text-[14px] font-[700] text-[#D1D5DB]">健身计划 · 推拉腿</span>
        <div data-name="plan-btn" class="bg-[#F97316] rounded-[12px] px-[12px] py-[6px]"><span class="text-[12px] font-[700] text-[#FFFFFF]">诺神开练！</span></div>
      </div>
      <span data-name="plan-meta" class="text-[12px] text-[#9CA3AF]">6训练日 · 周总消耗 4200kcal · 日均55分钟</span>
    </div>
    <div data-name="api-card" class="flex flex-col self-stretch bg-[#1F2937] border-[1px] border-[#374151] rounded-[16px] p-[16px] gap-[8px]">
      <span data-name="api-title" class="text-[14px] font-[700] text-[#D1D5DB]">AI API 设置</span>
      <div data-name="api-key" class="bg-[#374151] rounded-[12px] px-[12px] py-[8px]"><span class="text-[14px] text-[#6B7280]">sk-••••••••••••</span></div>
      <span data-name="api-note" class="text-[10px] text-[#6B7280]">给诺神接上 AI 大脑，只存本地不上传</span>
    </div>
  </div>
  <div data-name="bottom-nav" class="flex flex-row justify-around items-center self-stretch w-[390px] h-[64px] bg-[#111827] border-t-[1px] border-[#374151]">
    <div data-name="nav-today" class="flex flex-col items-center gap-[2px]"><img data-name="nav-today-icon" src="./asset/icons/nav-today.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-today-label" class="text-[11px] text-[#6B7280]">今日干饭</span></div>
    <div data-name="nav-history" class="flex flex-col items-center gap-[2px]"><img data-name="nav-history-icon" src="./asset/icons/nav-history.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-history-label" class="text-[11px] text-[#6B7280]">战绩回顾</span></div>
    <div data-name="nav-profile" class="flex flex-col items-center gap-[2px]"><img data-name="nav-profile-icon" src="./asset/icons/nav-profile.png" class="w-[38px] h-[38px] object-contain" /><span data-name="nav-profile-label" class="text-[11px] font-[700] text-[#F97316]">诺神配置</span></div>
  </div>
</main>
